<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/slide/slide.css">
    <style>
        img{
            border-radius: 5px;
            box-sizing: border-box;
        }
        .slide-box{
            width: 100%;            
            border-radius: 5px;
            border: white solid;
        }
        .container{
            width: 80%;
            margin: 0 auto;
            margin-top: 80px;
            flex-direction: row;
            justify-content: center;
            aspect-ratio: 2/1;
        }
        button{
            width: 100%;   
            aspect-ratio: 10/1;
            color: #062173;
        }
        .container>div{
            width: auto;
            height: 100%;
            margin: 0 10px;
        }
        #box2{
            flex: 4;
        }
        .box1{
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        a{
            gap: 10px;
        }
        a>img{
            height: auto;
            width: 80%;
        }
        a:not(:hover)>img{
            background: none;
        }
        .slide-box{
            height: 100%;
        }
    </style>
</head>
<body>
    <iframe src="menu.html" class="menu"></iframe>
    <div class="container sort-center star-box">
        <div class="box1">
            <a class="hover-style sort-center">
                <img class="logo" src="/rsc/메뉴바/나라.png">
                <button>나라</button>

            </a>
            <a class="hover-style sort-center" href="https://www.youtube.com/@Genshinimpact_KR">
                <img class="logo" src="/rsc/메뉴바/유튜브.png">
                <button type="button">공식</button>
            </a>
        </div>

        <div class="sort-center" id="box2">
            <div class="slide-box">
                <div class="slide-track">
                    <img src="/rsc/슬라이드/일러1.jpg">
                    <img src="/rsc/슬라이드/일러2.jpg">
                    <img src="/rsc/슬라이드/일러3.jpg">
                    <img src="/rsc/슬라이드/일러4.jpg">
                </div>
            </div>
            <button onclick="location.href='https://genshin.hoyoverse.com/ko'">원신 다운로드하러 가기</button>
        </div>

        <div class="box1">
            <a class="hover-style sort-center">
                <img  class="logo" src="/rsc/메뉴바/캐릭터.png">
                <button>캐릭터</button>
            </a>
            <a class="hover-style sort-center">
                <img  class="logo" src="/rsc/메뉴바/뽑기.png">
                <button>뽑기</button>
            </a>
        </div>
        
    </div>
    <script src="/star/star.js"></script>
    <script src="/slide/slide.js"></script>
</body>
</html>
