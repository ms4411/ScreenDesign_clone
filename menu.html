
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body,html{
            background-color: rgba(0, 0, 0, 0);
            background-image: linear-gradient(205deg,#062173, black);
        }
        body{
            box-sizing: border-box;
            padding: 5px;
            display: flex;
            position: relative;
            align-items: center;
            padding: 0 50px;
            width: 100%;
            border-bottom: white solid 0.5px;
        }
        #menu-list{
            box-sizing: border-box;
            display: flex;
            align-items: center;
            width: 50%;
            height: 100%;
            margin: auto;
            z-index: 1;
        }
        #menu-list>a{
            flex: 1;
            flex-direction: row;
            height: 100%;
            background-color: rgba(0,0,0,0);
            transition: all 0.5s;
            border-right: #dce2f2 double;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        #menu-list>a:last-child{
            border-right: none;
        }
        #home-logo{
            box-sizing: border-box;
            display: inline-block;
            height: 100%;
            z-index: 2;
        }
        .select{
            background-color: rgba(0,0,0,0.5);
        }
        .box{
            height: 80%;
            padding: 5%;
            margin-bottom: 2%;
            box-sizing: content-box;
        }
        a>p{
            font-size: large;
            text-shadow: #062173 1px 1px;
        }
        #acc-btn{
            height: fit-content;
            width: 7%;
            border-radius: 3350px;
        }
    </style>
</head>
<body>
    <a href="/home.html" target="_top" id="home-logo"><img src="/rsc/logo.png" class="logo"></a>
    <div id="menu-list">
        <a href="/contryHome.html" target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/나라.png" class="logo"></div><p>나라</p></a>
        <a target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/캐릭터.png" class="logo"></div><p>캐릭터</p></a>
        <a target="_top" class="sort-center hover-style"><div class="box"><img src="/rsc/메뉴바/뽑기.png" class="logo"></div><p>뽑기</p></a>
    </div>
    <button id="acc-btn" class="btn-style1">로그인</button>
</body>
</html>
